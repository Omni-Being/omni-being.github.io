	<link rel="stylesheet" type="text/css" href="../../assets/bootstrap5/icons/bootstrap-icons.css">

<body>



<nav class="navbar navbar-dark sticky-top p-0">
	<div class="container-fluid justify-content-end p-0">
		<a class="navbar-brand" href="">OMNI</a>		
	</div>
</nav>



<form class="p-2">
	<div class="container shadow my-5 py-3">

		<div class="row p-3">
			<h1 class="display-4 text-center">IronX</h1>
		</div>
	
		<div class="row p-3">
			<div class="input-group">
				<span class="input-group-text bg-light" id="basic-user">
					<i class="bi bi-person-fill"></i>
				</span>
				<input type="text" class="form-control shadow-none" aria-label="Username" aria-describedby="basic-user" id="user_name" required>
			</div>
		</div>
	
		<div class="row p-3">
			<div class="input-group">
				<span class="input-group-text bg-light" id="basic-password">
					<i class="bi bi-key-fill"></i>
				</span>
				<input type="password" class="form-control shadow-none" aria-label="Password" aria-describedby="basic-password" id="user_password" required>
			</div>
		</div>
	
		<div class="row p-3 m-0">
			<button type="button" class="btn btn-light shadow-none" onclick="CheckAuthentication();">Sign In</button>
		</div>

	</div>	
</form>
